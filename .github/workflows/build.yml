name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.23"
  BUN_VERSION: "1.2.21"
  WAILS_VERSION: "v2.12.0"

jobs:
  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Wails build
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform linux/amd64 -clean -trimpath \
            -tags webkit2_41 \
            -ldflags "-s -w -X main.version=dev-${GITHUB_SHA::7}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adila-ide-linux-amd64-${{ github.sha }}
          path: build/bin/adila-ide
          retention-days: 14
          if-no-files-found: error
