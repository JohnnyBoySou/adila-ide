name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.23"
  BUN_VERSION: "1.2.21"
  WAILS_VERSION: "v2.12.0"

jobs:
  frontend:
    name: Frontend (typecheck + lint + fmt)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check
        continue-on-error: true

  backend:
    name: Backend (vet + build + test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: System deps (Wails build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Stub frontend/dist (satisfaz o go:embed sem build completo)
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Format check
        continue-on-error: true
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Arquivos Go fora de formato:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet -tags webkit2_41 .

      - name: go test (no bench)
        run: go test -tags webkit2_41 -timeout 5m -count=1 .

  linux-appimage:
    name: Linux AppImage (Wails + linuxdeploy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: System deps (Wails + AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config \
            libgirepository1.0-dev librsvg2-dev dpkg-dev file imagemagick

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Wails build
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build -platform linux/amd64 -clean -trimpath \
            -tags webkit2_41 \
            -ldflags "-s -w -X main.version=ci-${{ github.sha }}"

      - name: Cache linuxdeploy
        uses: actions/cache@v4
        with:
          path: .cache/linuxdeploy-tools
          key: linuxdeploy-appimage-${{ runner.os }}-x86_64-v1

      - name: Build AppImage
        env:
          VERSION: "0.0.0-ci.${{ github.run_number }}"
        run: |
          chmod +x build/linux/build-appimage.sh
          ./build/linux/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: adila-ide-linux-appimage
          path: dist/adila-ide-*-x86_64.AppImage
          if-no-files-found: error
