name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.23"
  BUN_VERSION: "1.2.21"

jobs:
  frontend:
    name: Frontend (typecheck + lint + fmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # Reabilitar após rodar `bun run fmt` no repo inteiro:
      # - name: Format check
      #   run: bun run fmt:check

  backend:
    name: Backend (vet + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: System deps (Wails build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Stub frontend/dist (satisfaz o go:embed sem build completo)
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: go vet
        run: go vet -tags webkit2_41 .

      - name: go build
        run: go build -tags webkit2_41 .

      - name: go test (no bench)
        run: go test -tags webkit2_41 -timeout 5m -count=1 .
