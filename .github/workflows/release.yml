name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      tag:
        description: "Tag a publicar (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.23"
  BUN_VERSION: "1.2.21"
  WAILS_VERSION: "v2.12.0"

jobs:
  release-linux:
    name: Release (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Wails build
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform linux/amd64 -clean -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}"

      - name: Package
        id: pkg
        run: |
          mkdir -p dist
          ASSET="adila-ide-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz"
          tar -C build/bin -czf "dist/${ASSET}" adila-ide
          (cd dist && sha256sum "${ASSET}" > "${ASSET}.sha256")
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ steps.pkg.outputs.asset }}
            dist/${{ steps.pkg.outputs.asset }}.sha256
