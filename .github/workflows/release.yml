name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      tag:
        description: "Tag a publicar (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
  BUN_VERSION: "1.2.21"
  WAILS_VERSION: "v3.0.0-alpha.78"

jobs:
  release-linux:
    name: Release (Linux x64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config \
            libgirepository1.0-dev librsvg2-dev dpkg-dev file imagemagick

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3
          key: wails-${{ env.WAILS_VERSION }}-${{ runner.os }}

      - name: Install Wails CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Generate bindings
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails3 generate bindings -ts -clean

      - name: Frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Frontend build
        working-directory: frontend
        run: bun run build

      - name: Backend build
        run: |
          mkdir -p build/bin
          go build -tags production,webkit2_41 -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o build/bin/adila-ide .

      - name: Package
        id: pkg
        run: |
          mkdir -p dist/pkg

          # Binário principal
          cp build/bin/adila-ide dist/pkg/adila-ide

          # Ícone (nome adila-ide.png bate com o install.sh e o .desktop)
          cp build/appicon.png dist/pkg/adila-ide.png

          # Arquivos de integração com o desktop Linux
          cp build/linux/adila-ide.desktop dist/pkg/adila-ide.desktop
          cp build/linux/install.sh        dist/pkg/install.sh
          cp build/linux/install.txt       dist/pkg/install.txt
          chmod +x dist/pkg/install.sh

          ASSET="adila-ide-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz"
          tar -C dist/pkg -czf "dist/${ASSET}" \
            adila-ide adila-ide.png adila-ide.desktop install.sh install.txt
          (cd dist && sha256sum "${ASSET}" > "${ASSET}.sha256")
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Cache linuxdeploy
        uses: actions/cache@v4
        with:
          path: .cache/linuxdeploy-tools
          key: linuxdeploy-appimage-${{ runner.os }}-x86_64-v1

      - name: AppImage (linuxdeploy)
        id: appimage
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x build/linux/build-appimage.sh
          ./build/linux/build-appimage.sh
          ASSET="adila-ide-${VERSION}-x86_64.AppImage"
          (cd dist && sha256sum "${ASSET}" > "${ASSET}.sha256")
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ steps.pkg.outputs.asset }}
            dist/${{ steps.pkg.outputs.asset }}.sha256
            dist/${{ steps.appimage.outputs.asset }}
            dist/${{ steps.appimage.outputs.asset }}.sha256

  release-windows:
    name: Release (Windows x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3.exe
          key: wails-${{ env.WAILS_VERSION }}-${{ runner.os }}

      - name: Install Wails CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Generate bindings
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails3 generate bindings -ts -clean

      - name: Frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Frontend build
        working-directory: frontend
        run: bun run build

      - name: Backend build
        shell: bash
        run: |
          mkdir -p build/bin
          go build -tags production -trimpath \
            -ldflags "-s -w -H windowsgui -X main.version=${{ steps.ver.outputs.version }}" \
            -o build/bin/adila-ide.exe .

      - name: Package
        id: pkg
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $zip = "adila-ide-$env:VERSION-windows-amd64.zip"
          Compress-Archive -Path build/bin/adila-ide.exe -DestinationPath "dist/$zip" -Force
          $zipHash = (Get-FileHash "dist/$zip" -Algorithm SHA256).Hash.ToLower()
          "$zipHash  $zip" | Out-File -FilePath "dist/$zip.sha256" -Encoding ascii -NoNewline

          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ steps.pkg.outputs.zip }}
            dist/${{ steps.pkg.outputs.zip }}.sha256
